{% extends "base.html" %}

{% block title %}회원가입 - EveryTripLog{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
    <div class="auth-wrapper">
        <div class="etl-card auth-card">
            <h2 class="auth-header">회원가입</h2>
            <form action="{{ url_for('auth.signup') }}" method="POST">
                <div>
                    <label class="auth-label">이메일 주소</label>
                    <input type="email" name="email" class="auth-input" required>
                </div>

                <div>
                    <label class="auth-label">사용자 이름</label>
                    <input type="text" name="username" class="auth-input" required>
                </div>

                <div>
                    <label class="auth-label">닉네임</label>
                    <input type="text" name="nickname" class="auth-input" required>
                </div>

                <div>
                    <label class="auth-label">비밀번호</label>
                    <input type="password" name="password" class="auth-input" required>
                </div>

                <div>
                    <label class="auth-label">비밀번호 확인</label>
                    <input type="password" name="password_confirm" class="auth-input" required>
                </div>

                <div>
                    <label class="auth-label">연락처</label>
                    <input type="text" name="phone_number" class="auth-input" placeholder="010-0000-0000" oninput="autoHyphen(this)" maxlength="13" required>
                </div>
                <button type="submit" class="auth-submit-btn">가입하기</button>
            </form>
            <div class="auth-links">
                <span>이미 계정이 있으신가요?</span>
                <a href="{{ url_for('auth.login') }}">로그인</a>
            </div>
        </div>
    </div>
{% endblock %}
