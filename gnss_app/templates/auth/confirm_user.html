{% extends "base.html" %}

{% block title %}본인 인증 - EveryTripLog{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="text-center mb-4">본인 인증</h2>
            <div class="etl-card auth-card">
                <form action="{{ url_for('mypage.confirm_user') }}" method="POST">
                    <div class="mb-4">
                        <label for="password" class="auth-label">현재 비밀번호</label>
                        <input type="password" class="auth-input mb-0" id="password" name="password" placeholder="본인 확인을 위해 비밀번호를 입력해주세요" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="auth-submit-btn">확인</button>
                        <a href="{{ url_for('mypage.index') }}" class="btn btn-secondary py-3" style="border-radius: 8px;">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
