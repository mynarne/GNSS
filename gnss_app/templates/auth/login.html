{% extends "base.html" %}

{% block title %}로그인 - EveryTripLog{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
    <div class="auth-wrapper">
        <div class="etl-card auth-card">
            <h2 class="auth-header">로그인</h2>
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label class="auth-label">아이디</label>
                    <input type="text" name="login_id" class="auth-input mb-0" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="mb-4 mt-3">
                    <label class="auth-label">비밀번호</label>
                    <input type="password" name="password" class="auth-input mb-0" required>
                </div>
                <button type="submit" class="auth-submit-btn">로그인</button>
            </form>

            <div class="text-center mt-3 mb-2">
                <a href="{{ url_for('auth.find_account') }}" class="text-decoration-none text-muted small"><i class="fa-solid fa-magnifying-glass me-1"></i>아이디 / 비밀번호 찾기</a>
            </div>

            <div class="divider">또는 SNS 계정으로 로그인</div>

            <div class="social-login-area mt-0 mb-0">
                <button type="button" class="btn-social btn-social-kakao" onclick="location.href='{{ url_for('auth.login_kakao') }}'">
                    <i class="fa-solid fa-comment me-2"></i> 카카오 로그인
                </button>
                <button type="button" class="btn-social btn-social-naver" onclick="location.href='{{ url_for('auth.login_naver') }}'">
                    <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" class="me-2">
                        <path d="M10.741 16L5.05 8.351V16H0V0h5.258l5.692 7.649V0h5.05v16h-5.259z" fill="#ffffff"/>
                    </svg>
                    네이버 로그인
                </button>
            </div>

            <div class="auth-links mt-4">
                <span>아직 계정이 없으신가요?</span>
                <a href="{{ url_for('auth.signup') }}">회원가입</a>
            </div>
        </div>
    </div>
{% endblock %}
