{% extends "base.html" %}

{% block title %}로그인 - EveryTripLog{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="etl-card auth-card">
        <h2 class="auth-header">로그인</h2>
        <form action="{{ url_for('auth.login') }}" method="POST">
            <div>
                <label class="auth-label">사용자 이름</label>
                <input type="text" name="username" class="auth-input" required>
            </div>
            <div>
                <label class="auth-label">비밀번호</label>
                <input type="password" name="password" class="auth-input" required>
            </div>
            <button type="submit" class="auth-submit-btn">로그인</button>
        </form>
        <div class="auth-links">
            <span>아직 계정이 없으신가요?</span>
            <a href="{{ url_for('auth.signup') }}">회원가입</a>
        </div>
    </div>
</div>
{% endblock %}
