{% extends "base.html" %}

{% block title %}비밀번호 변경 - EveryTripLog{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <h2 class="text-center mb-4">비밀번호 변경</h2>
            <div class="etl-card auth-card">
                <form action="{{ url_for('mypage.change_password') }}" method="POST" id="pwChangeForm">
                    <div class="mb-3">
                        <label for="current_password" class="auth-label">현재 비밀번호</label>
                        <input type="password" class="auth-input mb-0" id="current_password" name="current_password" required>
                    </div>

                    <div class="mb-3">
                        <label for="new_password" class="auth-label">새 비밀번호</label>
                        <input type="password" class="auth-input mb-0" id="new_password" name="new_password" placeholder="영문, 숫자, 특수문자 포함 8~16자" required>
                        <div id="pw-format-error" class="error-text">영문, 숫자, 특수문자를 포함해 8~16자로 입력해주세요.</div>
                    </div>

                    <div class="mb-4">
                        <label for="new_password_confirm" class="auth-label">새 비밀번호 확인</label>
                        <input type="password" class="auth-input mb-0" id="new_password_confirm" name="new_password_confirm" placeholder="새 비밀번호를 다시 입력하세요" required>
                        <div id="pw-match-error" class="error-text">비밀번호가 일치하지 않습니다.</div>
                        <div id="pw-match-success" class="success-text">비밀번호가 일치합니다!</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="auth-submit-btn" id="submitBtn" disabled>비밀번호 변경</button>
                        <a href="{{ url_for('mypage.index') }}" class="btn btn-secondary py-3" style="border-radius: 8px;">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
