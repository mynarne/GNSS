{% extends "base.html" %}

{% block title %}회원 정보 수정 - EveryTripLog{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mypage.css') }}">
{% endblock %}

{% block content %}
    <div class="row justify-content-center mt-4">
        <div class="col-md-6 mb-4">
            <div class="etl-card p-4">
                <h4 class="mypage-title">
                    <i class="fa-solid fa-user-pen mypage-icon"></i>회원 정보 수정
                </h4>
                <form action="{{ url_for('mypage.edit_profile') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted">아이디</label>
                        <input type="text" class="form-control bg-light" value="{{ g.user.login_id or '' }}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted">사용자 이름</label>
                        <input type="text" name="username" class="form-control bg-light" value="{{ g.user.username }}" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted">닉네임</label>
                        <input type="text" name="nickname" class="form-control" value="{{ g.user.nickname }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted">이메일</label>
                        <div class="input-group">
                            <input type="email" name="email" id="edit_email" class="form-control auth-input-group" value="{{ g.user.email }}" required>
                            <button class="btn-auth-action" type="button" onclick="requestVerifyCode('email', 'edit_email', 'edit_profile', 'edit-email-verify-section', this)">인증하기</button>
                        </div>
                    </div>

                    <div class="mb-3" id="edit-email-verify-section" style="display: none;">
                        <div class="input-group">
                            <div class="position-relative flex-grow-1">
                                <input type="text" id="edit-email-verify-code" class="form-control auth-input-group verify-code-input w-100 pe-5" placeholder="인증번호 6자리">
                                <div class="position-absolute top-50 end-0 translate-middle-y pe-3 d-flex align-items-center z-3">
                                    <span class="text-danger small me-2 timer-display">03:00</span>
                                    <button type="button" class="btn btn-link p-0 text-secondary text-decoration-none small btn-extend-time" onclick="extendVerifyTime('edit-email-verify-section')">시간 연장</button>
                                </div>
                            </div>
                            <button type="button" class="btn-auth-confirm z-3" onclick="verifyAuthCode('edit_email', 'edit-email-verify-code', 'edit-email-verify-feedback', 'edit-email-verify-section')">확인</button>
                        </div>
                        <div id="edit-email-verify-feedback" class="feedback-msg verify-feedback-msg mt-2"></div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted">연락처</label>
                        <div class="input-group">
                            <input type="text" name="phone_number" id="edit_phone" class="form-control auth-input-group" value="{{ g.user.phone_number or '' }}"
                                placeholder="010-0000-0000" oninput="autoHyphen(this)" maxlength="13">
                            <button class="btn-auth-action" type="button" onclick="requestVerifyCode('phone', 'edit_phone', 'edit_profile', 'edit-phone-verify-section', this)">인증하기</button>
                        </div>
                    </div>

                    <div class="mb-4" id="edit-phone-verify-section" style="display: none;">
                        <div class="input-group">
                            <div class="position-relative flex-grow-1">
                                <input type="text" id="edit-phone-verify-code" class="form-control auth-input-group verify-code-input w-100 pe-5" placeholder="인증번호 6자리">
                                <div class="position-absolute top-50 end-0 translate-middle-y pe-3 d-flex align-items-center z-3">
                                    <span class="text-danger small me-2 timer-display">03:00</span>
                                    <button type="button" class="btn btn-link p-0 text-secondary text-decoration-none small btn-extend-time" onclick="extendVerifyTime('edit-phone-verify-section')">시간 연장</button>
                                </div>
                            </div>
                            <button type="button" class="btn-auth-confirm z-3" onclick="verifyAuthCode('edit_phone', 'edit-phone-verify-code', 'edit-phone-verify-feedback', 'edit-phone-verify-section')">확인</button>
                        </div>
                        <div id="edit-phone-verify-feedback" class="feedback-msg verify-feedback-msg mt-2"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mypage-submit-btn">
                        수정 완료
                    </button>
                    <a href="{{ url_for('mypage.index') }}" class="btn btn-secondary w-100 mt-2">취소</a>
                </form>
            </div>
        </div>
    </div>
{% endblock %}

{% block extra_js %}
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
